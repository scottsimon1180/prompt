    function installSheetGestures() {
      els.sheetHeader.addEventListener("touchstart", event => {
        if (!els.sheetOverlay.classList.contains("show") || event.target.closest(".sheet-close")) return;
        sheetStartY = event.touches[0].clientY;
        sheetCurrentY = sheetStartY;
        sheetDragging = true;
        clearTimeout(sheetResetTimer);
        els.sheet.style.transition = "none";
      }, { passive: true });

      els.sheetHeader.addEventListener("touchmove", event => {
        if (!sheetDragging) return;
        sheetCurrentY = event.touches[0].clientY;
        const deltaY = sheetCurrentY - sheetStartY;
        if (deltaY > 0) {
          event.preventDefault();
          els.sheet.style.transform = `translateY(${deltaY}px)`;
        }
      }, { passive: false });

      const finishDrag = () => {
        if (!sheetDragging) return;
        sheetDragging = false;
        els.sheet.style.transition = "";
        const deltaY = sheetCurrentY - sheetStartY;
        if (deltaY > SHEET_DISMISSAL_THRESHOLD) {
          hideSheet();
        } else {
          els.sheet.style.transform = "";
        }
      };

      els.sheetHeader.addEventListener("touchend", finishDrag);
      els.sheetHeader.addEventListener("touchcancel", finishDrag);
    }

      dialog.setAttribute("role", "dialog");
      dialog.setAttribute("aria-modal", "true");
      dialog.tabIndex = -1;

      const head = document.createElement("div");
      head.className = "dialog-head";
      head.textContent = config.title || APP_NAME;
      dialog.appendChild(head);

      const body = document.createElement("div");
      body.className = "dialog-body";
      if (typeof config.body === "function") config.body(body);
      dialog.appendChild(body);

      const actions = document.createElement("div");
      actions.className = "dialog-actions";
      (config.actions || []).forEach(action => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "action-button" + (action.primary ? " primary" : "") + (action.danger ? " danger" : "");
        button.textContent = action.label;
        button.addEventListener("click", async () => {
          const shouldClose = config.onAction ? await config.onAction(action.value) : true;
          if (shouldClose !== false) hideDialog();
        });
        actions.appendChild(button);
      });
      dialog.appendChild(actions);

      els.dialogOverlay.appendChild(dialog);
      els.dialogOverlay.classList.add("show");
      requestAnimationFrame(() => {
        const focusTarget = dialog.querySelector("input, select, textarea, button, a[href]") || dialog;
        if (focusTarget && typeof focusTarget.focus === "function") {
          focusTarget.focus({ preventScroll: true });
        }
      });

      const cancel = () => {
        hideDialog();
        if (config.onCancel) config.onCancel();
      };
      els.dialogOverlay.onclick = event => {
        if (event.target === els.dialogOverlay) cancel();
      };
      dialog.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          event.preventDefault();
          cancel();
        }
        if (event.key === "Enter" && event.target.tagName === "INPUT") {
          const primary = dialog.querySelector(".action-button.primary");
          if (primary) primary.click();
        }
      });
    }

    function hideDialog() {
      els.dialogOverlay.classList.remove("show");
      els.dialogOverlay.innerHTML = "";
      els.dialogOverlay.onclick = null;
      if (!isIOS() && !isMarkdownPreviewMode()) els.editor.focus({ preventScroll: true });
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = window.setTimeout(() => {
        els.toast.classList.remove("show");
      }, 2400);
    }

    function handleMarkdownPreviewBeforeInput(event) {
      if (!isMarkdownPreviewMode()) return;
      clearMarkdownEmptyPlaceholder();
      if (event.inputType === "insertParagraph" && handleMarkdownInsertParagraph()) {
        event.preventDefault();
      } else if (event.inputType === "deleteContentBackward" && handleMarkdownDeleteBackward()) {
        event.preventDefault();
      }
    }

    function handleMarkdownPreviewInput() {
      syncEditorStateFromMarkdownPreview();
      scheduleMarkdownPreviewCaretVisible();
    }

    function handleMarkdownPreviewPaste(event) {
      if (!isMarkdownPreviewMode()) return;
      const text = event.clipboardData && event.clipboardData.getData("text/plain");
      if (text == null) return;
      event.preventDefault();
      clearMarkdownEmptyPlaceholder();
      insertPlainTextIntoMarkdownPreview(text);
      syncEditorStateFromMarkdownPreview();
      scheduleMarkdownPreviewCaretVisible();
    }

    function insertPlainTextIntoMarkdownPreview(text) {
      const selection = window.getSelection ? window.getSelection() : null;
      if (!selection || selection.rangeCount < 1) return;
      const range = selection.getRangeAt(0);
      if (!els.markdownPreview.contains(range.commonAncestorContainer)) return;
      range.deleteContents();
      const fragment = document.createDocumentFragment();
      String(text || "").split(/\r\n?|\n/).forEach((line, index) => {
        if (index > 0) fragment.appendChild(document.createElement("br"));
        fragment.appendChild(document.createTextNode(line));
      });
      const marker = document.createTextNode("");
      fragment.appendChild(marker);
      range.insertNode(fragment);
      range.setStartAfter(marker);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function handleMarkdownPreviewClick(event) {
      if (!isMarkdownPreviewMode()) return;
      const checkbox = event.target.closest('input[type="checkbox"][data-md-task]');
      if (checkbox && els.markdownPreview.contains(checkbox)) {
        window.setTimeout(() => syncMarkdownPreviewAfterDomEdit(), 0);
        return;
      }

      const image = currentMarkdownImageElement(event.target);
      if (image) {
        event.preventDefault();
        showMarkdownImageDialog(image);
        return;
      }

      const link = event.target.closest("a[data-md-link]");
      if (!link || !els.markdownPreview.contains(link)) return;
      event.preventDefault();
      if (els.markdownPreview.isContentEditable) {
        showMarkdownLinkActionSheet(link);
        return;
      }
      const url = link.dataset.mdLink || link.getAttribute("href") || "";
      if (String(url).startsWith("#")) {
        scrollMarkdownAnchor(url);
        return;
      }
      showMarkdownLinkSheet(url, link.textContent || "Markdown link");
    }

    function handleMarkdownPreviewDoubleClick(event) {
      if (!isMarkdownPreviewMode()) return;
      const image = currentMarkdownImageElement(event.target);
      if (image) {
        event.preventDefault();
        showMarkdownImageDialog(image);
      }
    }

    function handleMarkdownPreviewChange(event) {
      if (!isMarkdownPreviewMode()) return;
      if (event.target && event.target.matches('input[type="checkbox"][data-md-task]')) {
        syncMarkdownPreviewAfterDomEdit();
      }
    }

    function handleMarkdownPreviewKeydown(event) {
      if (!isMarkdownPreviewMode()) return;
      if (event.key === "Tab" && currentMarkdownTableCell()) {
        event.preventDefault();
        moveMarkdownTableCell(event.shiftKey ? -1 : 1);
        return;
      }
      if (event.key === "Escape") {
        els.markdownPreview.blur();
      }
    }

    function handleMarkdownImageError(event) {
      if (!event.target || event.target.tagName !== "IMG") return;
      const frame = event.target.closest(".md-image-frame");
      if (frame) frame.classList.add("is-broken");
    }

    function handleShortcuts(event) {
      const target = event.target;
      const tagName = target && target.tagName;
      const dialogOpen = els.dialogOverlay.classList.contains("show");
      const sheetOpen = els.sheetOverlay.classList.contains("show");
      if (event.key === "Escape" && sheetOpen) {
        event.preventDefault();
        hideSheet();
        return;
      }
      if (sheetOpen || dialogOpen || (target !== els.editor && ["INPUT", "SELECT", "TEXTAREA"].includes(tagName))) return;

      const mod = event.ctrlKey || event.metaKey;
      const key = event.key.toLowerCase();
      if (mod && key === "n") {
        event.preventDefault();
        if (isPromptMode()) addTab();
      } else if (mod && key === "o") {
        event.preventDefault();
        openDocument();
      } else if (mod && key === "s") {
        event.preventDefault();
        saveActiveDocument();
      } else if (mod && key === "w") {
        event.preventDefault();
        if (isPromptMode()) closeTab(state.activeIndex);
      } else if (mod && key === "f") {
        event.preventDefault();
        openFindDialog();
      } else if (mod && (event.key === "+" || event.key === "=")) {
        event.preventDefault();
        adjustTextSize(1);
      } else if (mod && event.key === "-") {
        event.preventDefault();
        adjustTextSize(-1);
      } else if (mod && event.key === "0") {
        event.preventDefault();
        setTextSize(12);
      } else if (event.key === "F3") {
        event.preventDefault();
        findNext(event.shiftKey);
      }
    }

    document.querySelectorAll("[data-menu]").forEach(button => {
      button.addEventListener("click", () => showMenu(button.dataset.menu));
    });
    document.querySelectorAll("[data-action]").forEach(button => {
      button.addEventListener("click", async () => {
        const action = button.dataset.action;
        if (action === "open") await openDocument();
        else if (action === "save") await saveActiveDocument();
        else if (action === "search") openFindDialog();
        else if (action === "copy") await copyEditorText(button);
        else if (action === "undo") await runHistoryCommand("undo");
        else if (action === "redo") await runHistoryCommand("redo");
      });
    });
    els.addTab.addEventListener("click", () => addTab());
    els.editor.addEventListener("input", handleEditorInput);
    els.editor.addEventListener("focus", () => {
      updateViewportMetrics();
      setTimeout(keepCaretVisible, 260);
    });
    els.editor.addEventListener("blur", () => setTimeout(updateViewportMetrics, 80));
    els.editor.addEventListener("select", () => {
      updateStatus();
      scheduleCaretVisible();
      scheduleMarkdownToolbarState();
    });
    els.editor.addEventListener("keyup", () => {
      updateStatus();
      scheduleCaretVisible();
      scheduleMarkdownToolbarState();
    });
    els.editor.addEventListener("click", () => {
      updateStatus();
      scheduleCaretVisible();
      scheduleMarkdownToolbarState();
    });
    els.editor.addEventListener("scroll", () => {
      const tab = currentTab();
      if (tab) tab.scroll = els.editor.scrollTop || 0;
      if (lineNumbersVisible()) els.lineNumbers.scrollTop = els.editor.scrollTop;
    }, { passive: true });
    els.markdownPreview.addEventListener("click", handleMarkdownPreviewClick);
    els.markdownPreview.addEventListener("dblclick", handleMarkdownPreviewDoubleClick);
    els.markdownPreview.addEventListener("beforeinput", handleMarkdownPreviewBeforeInput);
    els.markdownPreview.addEventListener("input", handleMarkdownPreviewInput);
    els.markdownPreview.addEventListener("change", handleMarkdownPreviewChange);
    els.markdownPreview.addEventListener("keydown", handleMarkdownPreviewKeydown);
    els.markdownPreview.addEventListener("paste", handleMarkdownPreviewPaste);
    els.markdownPreview.addEventListener("error", handleMarkdownImageError, true);
    els.markdownPreview.addEventListener("scroll", () => {
      const tab = currentTab();
      if (tab) tab.previewScroll = els.markdownPreview.scrollTop || 0;
    }, { passive: true });
    els.mdToolbar.addEventListener("mousedown", event => {
      if (!event.target.closest("[data-md-tool]")) return;
      captureMarkdownPreviewSelection();
      event.preventDefault();
    });
    els.mdToolbar.addEventListener("touchstart", event => {
      if (event.target.closest("[data-md-tool]")) captureMarkdownPreviewSelection();
    }, { passive: true });
    els.mdToolbar.addEventListener("click", event => {
      const button = event.target.closest("[data-md-tool]");
      if (!button) return;
      event.preventDefault();
      handleMarkdownTool(button.dataset.mdTool);
    });
    els.sheetClose.addEventListener("click", hideSheet);
    els.sheetOverlay.addEventListener("click", event => {
      if (event.target === els.sheetOverlay) hideSheet();
    });
    document.addEventListener("keydown", handleShortcuts);
    document.addEventListener("selectionchange", () => {
      if (document.activeElement === els.editor) {
        updateStatus();
        scheduleCaretVisible();
        scheduleMarkdownToolbarState();
      } else if (isMarkdownPreviewMode()) {
        captureMarkdownPreviewSelection();
        scheduleMarkdownToolbarState();
        scheduleMarkdownPreviewCaretVisible();
      }
    });
    window.addEventListener("beforeunload", event => {
      storeCurrentTab();
      if (!isDirty()) return;
      event.preventDefault();
      event.returnValue = "";
    });
    window.addEventListener("resize", () => {
      updateViewportMetrics();
      scheduleLineNumberUpdate();
      updateStatus();
    });
    window.addEventListener("orientationchange", () => {
      setTimeout(updateViewportMetrics, 160);
      setTimeout(updateViewportMetrics, 420);
    });
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateViewportMetrics);
      window.visualViewport.addEventListener("scroll", updateViewportMetrics);
    }

    installMobileViewportGuards();
    installSheetGestures();
    loadPreferences();
    updateViewportMetrics();
    loadTabIntoEditor(0);
    markClean(null);
  </script>
</body>
</html>
