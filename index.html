<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Prompt">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#EEF6FC">
  <link rel="apple-touch-icon" href="images/prompt-1024.png">
  <link rel="icon" href="images/prompt-64.png">
  <title>Prompt</title>
  <style>
    :root {
      --tab-bg: #d6ece5;
      --tab-edge: #c2ddd5;
      --tab-hover: #c7e2d9;
      --tab-press: #b5d8cd;
      --tab-active-width: clamp(176px, 26vw, 260px);
      --tab-inactive-width: clamp(116px, 16vw, 188px);
      --tab-inactive-max: 188px;
      --tab-compact-width: clamp(74px, 10vw, 104px);
      --menu-bg: #eef6f3;
      --menu-edge: #dce9e4;
      --menu-hover: #e2eeea;
      --menu-press: #d4e5df;
      --editor: #fafafa;
      --editor-edge: #e8e8e8;
      --ink: #1a1a1a;
      --ink-muted: #5c5c5c;
      --ink-faint: #8a8a8a;
      --accent: #0067c0;
      --accent-soft: #cce4f7;
      --danger: #c42b1c;
      --save-ok: #107c41;
      --save-ok-bg: rgba(16, 124, 65, 0.11);
      --save-dirty: #c42b1c;
      --save-dirty-bg: rgba(196, 43, 28, 0.1);
      --sheet: rgba(255, 255, 255, 0.92);
      --ios-sheet-bg: #ffffff;
      --ios-sheet-button: #f2f2f7;
      --ios-sheet-button-active: #e5e5ea;
      --ios-sheet-grabber: #d1d1d6;
      --ios-sheet-backdrop: rgba(0, 0, 0, 0.26);
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.18);
      --chrome-font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --editor-font: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --app-height: 100dvh;
      --keyboard-inset: 0px;
      --bottom-rail-height: 58px;
    }

    .app.txt-mode {
      --tab-bg: #d8eaf7;
      --tab-edge: #c3dcec;
      --tab-hover: #c9e2f3;
      --tab-press: #b7d5ea;
      --menu-bg: #eef6fc;
      --menu-edge: #dce9f2;
      --menu-hover: #e3eff8;
      --menu-press: #d5e7f3;
    }

    .app.md-mode {
      --tab-bg: #f0dfc2;
      --tab-edge: #dfc69d;
      --tab-hover: #ead4ad;
      --tab-press: #dec28f;
      --menu-bg: #fbf4e8;
      --menu-edge: #eadcc7;
      --menu-hover: #f3e8d6;
      --menu-press: #eadabe;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: var(--app-height);
      margin: 0;
      overflow: hidden;
      background: var(--editor);
      color: var(--ink);
      font-family: var(--chrome-font);
      touch-action: pan-x pan-y;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-width: 320px;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      background: transparent;
      touch-action: manipulation;
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      width: 100%;
      height: var(--app-height);
      background: var(--editor);
      overflow: hidden;
    }

    .app.toolbar-top {
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }

    .app.md-mode {
      grid-template-rows: auto auto minmax(0, 1fr) auto auto;
    }

    .app.toolbar-top.md-mode {
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
    }

    .chrome {
      padding-top: var(--safe-top);
      background: var(--tab-bg);
      border-bottom: 0;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      min-height: 48px;
      padding: 8px calc(14px + var(--safe-right)) 7px calc(14px + var(--safe-left));
      gap: 10px;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      color: var(--ink);
      font-weight: 700;
      font-size: 16px;
      line-height: 1.2;
    }

    .app-title img {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.14);
      flex: 0 0 auto;
    }

    .document-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .save-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      max-width: 42vw;
      padding: 2px 9px;
      border: 1px solid currentColor;
      border-radius: 999px;
      background: var(--save-dirty-bg);
      color: var(--save-dirty);
      font-size: 11px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 0 0 auto;
      line-height: 1;
    }

    .save-state.clean {
      background: var(--save-ok-bg);
      color: var(--save-ok);
    }

    .save-state.dirty {
      background: var(--save-dirty-bg);
      color: var(--save-dirty);
    }

    .tab-strip {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      column-gap: 6px;
      min-height: 46px;
      padding-left: calc(9px + var(--safe-left));
      padding-right: calc(9px + var(--safe-right));
    }

    .tab-strip::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 0;
      height: 1px;
      background: var(--tab-edge);
    }

    .app.txt-mode .tab-strip,
    .app.md-mode .tab-strip {
      display: none;
    }

    .app.txt-mode .chrome,
    .app.md-mode .chrome {
      border-bottom: 1px solid var(--tab-edge);
    }

    .tabs {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      min-width: 0;
      min-height: 45px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-top: 6px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      --tab-title-floor: 78px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-width: max(var(--tab-compact-width), var(--tab-title-floor));
      max-width: var(--tab-inactive-max);
      height: 38px;
      margin-bottom: -1px;
      padding: 0 13px;
      border: 1px solid transparent;
      border-bottom: 0;
      border-radius: 10px 10px 0 0;
      background: rgba(255, 255, 255, 0.22);
      color: #2d3a37;
      cursor: default;
      flex: 1 1 var(--tab-inactive-width);
      overflow: hidden;
      transition: background-color 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
      touch-action: pan-x;
    }

    .tab:not(.active):hover,
    .tab:not(.active):focus-visible {
      background: var(--tab-hover);
      border-color: rgba(143, 174, 165, 0.5);
    }

    .tab.active {
      z-index: 2;
      background: var(--editor);
      border-color: var(--tab-edge);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.75), 0 -1px 0 rgba(255, 255, 255, 0.8);
      color: var(--ink);
      flex: 0 0 var(--tab-active-width);
      width: var(--tab-active-width);
      min-width: var(--tab-active-width);
      max-width: var(--tab-active-width);
    }

    .tab-label {
      display: block;
      min-width: 0;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 540;
      line-height: 1;
      text-align: left;
    }

    .tab.active .tab-label {
      font-weight: 680;
    }

    .add-tab {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      color: var(--ink-muted);
      font-size: 17px;
      line-height: 1;
    }

    .add-tab {
      margin: 0 0 7px 0;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid transparent;
      font-size: 22px;
    }

    .add-tab:hover,
    .add-tab:focus-visible {
      background: var(--tab-hover);
      color: var(--ink);
    }

    .menu-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 38px;
      padding: 0 calc(9px + var(--safe-right)) 0 calc(9px + var(--safe-left));
      background: var(--menu-bg);
      border-bottom: 1px solid var(--menu-edge);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .menu-row::-webkit-scrollbar {
      display: none;
    }

    .menu-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 72px;
      min-height: 32px;
      padding: 0 13px;
      border-radius: 9px;
      color: var(--ink);
      font-size: 13px;
      text-align: center;
      white-space: nowrap;
    }

    .menu-button:hover,
    .menu-button:focus-visible {
      background: var(--menu-hover);
    }

    .menu-button:active,
    .menu-button.active {
      background: var(--menu-press);
    }

    .editor-stage {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      min-height: 0;
      background: var(--editor);
      overflow: hidden;
    }

    .editor-stage.show-line-numbers {
      grid-template-columns: minmax(38px, auto) minmax(0, 1fr);
    }

    .line-numbers {
      display: none;
      min-width: 38px;
      padding: 18px 8px 0 calc(8px + var(--safe-left));
      border-right: 1px solid rgba(0, 0, 0, 0.06);
      background: rgba(246, 248, 248, 0.78);
      color: rgba(92, 92, 92, 0.68);
      font-family: var(--editor-font);
      font-size: 14px;
      line-height: 1.25;
      text-align: right;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      white-space: nowrap;
    }

    .editor-stage.show-line-numbers .line-numbers {
      display: block;
    }

    .line-number-row {
      display: block;
      min-height: 1em;
      line-height: inherit;
    }

    .line-number-measure {
      position: absolute;
      left: -10000px;
      top: 0;
      z-index: -1;
      visibility: hidden;
      pointer-events: none;
      overflow: hidden;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: normal;
    }

    #editor {
      display: block;
      width: 100%;
      min-width: 0;
      height: 100%;
      margin: 0;
      padding: 18px calc(18px + var(--safe-right)) calc(22px + var(--keyboard-inset)) calc(18px + var(--safe-left));
      border: 0;
      outline: 0;
      resize: none;
      background: var(--editor);
      color: var(--ink);
      caret-color: var(--accent);
      font-family: var(--editor-font);
      font-size: 14px;
      line-height: 1.25;
      tab-size: 4;
      -webkit-text-size-adjust: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
    }

    .editor-stage.show-line-numbers #editor {
      padding-left: 14px;
    }

    #editor::selection {
      background: var(--accent-soft);
    }

    #editor.no-wrap {
      white-space: pre;
      overflow-wrap: normal;
      overflow-x: auto;
    }

    #editor[hidden],
    .markdown-preview[hidden] {
      display: none !important;
    }

    .markdown-preview {
      width: 100%;
      height: 100%;
      min-width: 0;
      padding: 22px calc(20px + var(--safe-right)) calc(28px + var(--keyboard-inset)) calc(20px + var(--safe-left));
      background: var(--editor);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.58;
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
      word-break: normal;
      overflow-wrap: anywhere;
      user-select: text;
      -webkit-user-select: text;
      outline: 0;
    }

    .markdown-preview:focus-visible {
      box-shadow: inset 0 0 0 2px rgba(178, 118, 25, 0.28);
    }

    .app.md-mode.md-preview .editor-stage {
      grid-template-columns: minmax(0, 1fr);
    }

    .app.md-mode.md-preview .line-numbers {
      display: none;
    }

    .md-toolbar {
      display: none;
      min-width: 0;
      min-height: 44px;
      padding: 5px calc(8px + var(--safe-right)) 5px calc(8px + var(--safe-left));
      border-bottom: 1px solid rgba(118, 82, 30, 0.18);
      background: linear-gradient(180deg, rgba(251, 244, 232, 0.98), rgba(245, 232, 211, 0.96));
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    .app.md-mode .md-toolbar {
      display: block;
    }

    .toolbar-top.md-mode .md-toolbar {
      grid-row: 3;
      border-top: 1px solid rgba(255, 255, 255, 0.72);
    }

    .toolbar-top.md-mode .editor-stage {
      grid-row: 4;
    }

    .toolbar-top.md-mode .status-bar {
      grid-row: 5;
    }

    .md-toolbar-scroll {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      min-height: 34px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }

    .md-toolbar-scroll::-webkit-scrollbar {
      display: none;
    }

    .md-tool-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 38px;
      height: 34px;
      border: 1px solid rgba(128, 88, 31, 0.18);
      border-radius: 11px;
      background: rgba(255, 252, 247, 0.82);
      color: #4f3512;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.82) inset;
      transition: background-color 120ms ease, border-color 120ms ease, transform 90ms ease;
    }

    .md-tool-button:active,
    .md-tool-button:focus-visible {
      border-color: rgba(135, 87, 18, 0.34);
      background: #eadabe;
      transform: scale(0.96);
    }

    .md-tool-button.active,
    .md-tool-button[aria-pressed="true"] {
      border-color: rgba(142, 92, 18, 0.46);
      background: #dfc391;
      color: #2f210f;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.72) inset,
        0 0 0 1px rgba(142, 92, 18, 0.08);
    }

    .md-tool-button svg {
      display: block;
      width: 21px;
      height: 21px;
    }

    .md-tool-button[data-md-tool="style"] svg {
      width: 24px;
      height: 14px;
    }

    .md-tool-button[data-md-tool="heading"] svg {
      width: 19px;
      height: 22px;
    }

    .md-tool-button[data-md-tool="quote"] svg {
      width: 23px;
      height: 17px;
    }

    .markdown-preview > * {
      max-width: 860px;
      margin-right: auto;
      margin-left: auto;
    }

    .markdown-preview h1,
    .markdown-preview h2,
    .markdown-preview h3,
    .markdown-preview h4,
    .markdown-preview h5,
    .markdown-preview h6 {
      margin: 1.35em auto 0.58em;
      color: #151515;
      font-weight: 760;
      line-height: 1.18;
    }

    .markdown-preview h1 {
      margin-top: 0;
      padding-bottom: 0.28em;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      font-size: clamp(27px, 8vw, 42px);
    }

    .markdown-preview h2 {
      padding-bottom: 0.24em;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      font-size: clamp(23px, 6.5vw, 32px);
    }

    .markdown-preview h3 {
      font-size: clamp(20px, 5.6vw, 25px);
    }

    .markdown-preview h4 {
      font-size: 18px;
    }

    .markdown-preview h5,
    .markdown-preview h6 {
      color: var(--ink-muted);
      font-size: 16px;
    }

    .markdown-preview p,
    .markdown-preview ul,
    .markdown-preview ol,
    .markdown-preview blockquote,
    .markdown-preview pre,
    .markdown-preview table,
    .markdown-preview .md-image-frame {
      margin-top: 0;
      margin-bottom: 1em;
    }

    .markdown-preview p {
      color: #242424;
    }

    .markdown-preview a {
      color: #8a5a00;
      text-decoration-color: rgba(138, 90, 0, 0.38);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 0.18em;
    }

    .markdown-preview a:active {
      color: #6f4600;
    }

    .markdown-preview[contenteditable="true"] a {
      cursor: text;
    }

    .markdown-preview[contenteditable="true"] a[data-md-link],
    .markdown-preview[contenteditable="true"] .md-image-frame,
    .markdown-preview[contenteditable="true"] table {
      cursor: pointer;
    }

    .markdown-preview[contenteditable="true"] td,
    .markdown-preview[contenteditable="true"] th {
      min-width: 76px;
    }

    .markdown-preview[contenteditable="true"] :is(td, th):focus-visible {
      outline: 2px solid rgba(178, 118, 25, 0.28);
      outline-offset: -2px;
    }

    .markdown-preview strong {
      font-weight: 760;
    }

    .markdown-preview code,
    .markdown-preview pre {
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
    }

    .markdown-preview :not(pre) > code {
      padding: 0.12em 0.32em;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 5px;
      background: #f2eee7;
      color: #4a3518;
      font-size: 0.9em;
    }

    .markdown-preview pre {
      padding: 14px 15px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 9px;
      background: #f6f1e9;
      color: #2a261f;
      font-size: 13px;
      line-height: 1.48;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .markdown-preview pre code {
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: inherit;
    }

    .markdown-preview blockquote {
      padding: 0.15em 0 0.15em 1em;
      border-left: 4px solid #d5ad70;
      color: var(--ink-muted);
    }

    .markdown-preview blockquote > :last-child {
      margin-bottom: 0;
    }

    .markdown-preview ul,
    .markdown-preview ol {
      padding-left: 1.45em;
    }

    .markdown-preview li {
      margin: 0.25em 0;
    }

    .markdown-preview li > p {
      margin: 0.35em 0;
    }

    .markdown-preview .task-list-item {
      list-style: none;
      margin-left: -1.4em;
    }

    .markdown-preview .task-list-item input {
      width: 1em;
      height: 1em;
      margin: 0 0.5em 0 0;
      vertical-align: -0.12em;
      accent-color: #b27619;
    }

    .markdown-preview table {
      display: block;
      width: 100%;
      border-collapse: collapse;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .markdown-preview th,
    .markdown-preview td {
      padding: 8px 10px;
      border: 1px solid rgba(0, 0, 0, 0.11);
      vertical-align: top;
    }

    .markdown-preview th {
      background: #f3eadb;
      color: #2b2114;
      font-weight: 720;
    }

    .markdown-preview tr:nth-child(even) td {
      background: rgba(246, 241, 233, 0.64);
    }

    .markdown-preview hr {
      height: 1px;
      max-width: 860px;
      margin: 1.45em auto;
      border: 0;
      background: rgba(0, 0, 0, 0.14);
    }

    .markdown-preview .md-image-frame {
      display: block;
    }

    .markdown-preview img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: #f2eee7;
    }

    .markdown-preview .md-image-placeholder {
      display: none;
      min-height: 84px;
      align-items: center;
      justify-content: center;
      padding: 16px;
      border: 1px dashed #c5a16d;
      border-radius: 10px;
      background: #fbf4e8;
      color: #725222;
      font-size: 14px;
      text-align: center;
    }

    .markdown-preview .md-image-frame.is-broken img {
      display: none;
    }

    .markdown-preview .md-image-frame.is-broken .md-image-placeholder {
      display: flex;
    }

    .markdown-preview .md-empty {
      margin-top: 0;
      color: var(--ink-faint);
    }

    .markdown-preview .md-empty::before {
      content: "Start typing Markdown";
    }

    .link-panel {
      display: grid;
      gap: 12px;
    }

    .link-url {

    @keyframes copyMessage {
      0% {
        opacity: 0;
        transform: translateY(7px) scale(0.94);
      }
      18% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      68% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-5px) scale(0.98);
      }
    }

    @keyframes copyIconPop {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(0.84);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .copy-flash.show {
        animation: none;
        opacity: 1;
        transform: none;
      }

      .copy-flash.show::before {
        animation: none;
        opacity: 0.55;
        transform: none;
      }

      .editor-stage.copy-confirm #editor,
      .editor-stage.copy-confirm .line-numbers {
        animation: none;
        background: #e5f7ed;
        color: #0b5f3a;
      }

      .mobile-action.copy-action.copied .toolbar-icon {
        animation: none;
      }
    }

    @media (max-width: 759px) {
      :root {
        --tab-active-width: clamp(148px, 42vw, 190px);
        --tab-inactive-width: clamp(96px, 28vw, 154px);
        --tab-inactive-max: 164px;
        --tab-compact-width: clamp(68px, 17vw, 90px);
      }

      .app {
        grid-template-rows: auto minmax(0, 1fr) auto auto;
      }

      .app.toolbar-top {
        grid-template-rows: auto auto minmax(0, 1fr) auto;
      }

      .app.md-mode {
        grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      }

      .app.toolbar-top.md-mode {
        grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      }

      .title-row {
        grid-template-columns: minmax(0, 1fr);
        min-height: 50px;
      }

      .app-title {
        font-size: 16px;
      }

      .save-state {
        max-width: 46vw;
      }

      .menu-row {
        display: none;
      }

      .mobile-actions {
        display: grid;
      }

      #editor {
        padding-top: 16px;
        padding-bottom: calc(22px + var(--keyboard-inset));
      }

      .status-bar {
        height: calc(27px + var(--safe-bottom));
        min-height: calc(27px + var(--safe-bottom));
        font-size: 11px;
      }

      .app:not(.toolbar-top) .status-bar {
        height: 34px;
        min-height: 34px;
        padding-top: 4px;
        padding-bottom: 4px;
      }

      .sheet-item {
        min-height: 50px;
        font-size: 16px;
      }

      .dialog-actions {
        flex-wrap: wrap;
      }

      .action-button {
        flex: 1 1 auto;
        min-height: 42px;
      }
    }

    @media (orientation: landscape) and (max-height: 540px) {
      :root {
        --tab-active-width: clamp(140px, 28vw, 210px);
        --tab-inactive-width: clamp(90px, 18vw, 150px);
        --tab-inactive-max: 160px;
        --tab-compact-width: clamp(64px, 12vw, 84px);
      }

      .title-row {
        min-height: 34px;
        padding-top: 3px;
        padding-bottom: 3px;
      }

      .app-title {
        font-size: 14px;
      }

      .app-title img {
        width: 22px;
        height: 22px;
        border-radius: 6px;
      }

      .line-numbers {
        padding-top: 10px;
      }

      .save-state {
        min-height: 25px;
        font-size: 11px;
      }

      .tab-strip {
        min-height: 36px;
      }

      .tab {
        height: 31px;
        border-radius: 9px 9px 0 0;
        padding-left: 11px;
        padding-right: 11px;
      }

      .tab-label {
        font-size: 12px;
      }

      .add-tab {
        width: 28px;
        height: 28px;
        margin-bottom: 3px;
      }

      .menu-row {
        display: none;
        min-height: 32px;
      }

      .menu-button {
        min-height: 28px;
        min-width: 66px;
        font-size: 12px;
      }

      .mobile-actions {
        --toolbar-row-center: 24px;
        display: grid;
        min-height: calc(48px + var(--safe-bottom));
        padding-top: 4px;
        padding-bottom: calc(4px + var(--safe-bottom));
      }

      .toolbar-top .mobile-actions {
        min-height: 48px;
        padding-top: 4px;
        padding-bottom: 4px;
      }

      .toolbar-top.status-hidden #editor {
        padding-bottom: calc(14px + var(--safe-bottom) + var(--keyboard-inset));
      }

      .mobile-action {
        min-height: 38px;
        border-radius: 13px;
      }

      .mobile-action.icon-button,
      .settings-button {
        width: 38px;
        min-width: 38px;
        flex-basis: 38px;
      }

      #editor {
        padding-top: 10px;
        padding-bottom: calc(14px + var(--keyboard-inset));
      }

      .status-bar {
        height: 23px;
        min-height: 23px;
        font-size: 11px;
      }

      .app:not(.toolbar-top) .status-bar {
        bottom: calc(48px + var(--safe-bottom));
        height: 32px;
        min-height: 32px;
        padding-top: 3px;
        padding-bottom: 3px;
      }

      .status-segment {
        line-height: 1;
      }

      .sheet-item {
        min-height: 40px;
      }
    }

    @media (max-width: 380px) {
      .toolbar-middle-action.mobile-action.icon-button {
        width: 38px;
      }

      .settings-button {
        width: 38px;
        min-width: 38px;
        flex-basis: 38px;
      }
    }

    @media (max-width: 340px) {
      .mobile-actions {
        grid-template-columns: auto minmax(31px, 1fr) auto minmax(31px, 1fr) auto;
      }

      .toolbar-file-button {
        width: 78px;
        min-width: 78px;
        gap: 6px;
        padding-left: 8px;
        padding-right: 8px;
      }

      .file-badge-icon {
        width: 22px;
        height: 18px;
        flex-basis: 22px;
      }

      .file-badge-text {
        font-size: 12px;
      }

      .toolbar-center .mobile-action.icon-button {
        width: 34px;
        min-width: 34px;
        flex-basis: 34px;
      }

      .toolbar-middle-action.mobile-action.icon-button {
        width: 31px;
      }

      .settings-button {
        width: 36px;
        min-width: 36px;
        flex-basis: 36px;
      }
    }

    @media (min-width: 760px) and (min-height: 541px) {
      .title-row {
        min-height: 42px;
        padding-top: 5px;
        padding-bottom: 4px;
      }

      .sheet-item {
        font-size: 13px;
      }
    }
  </style>
</head>

  <input id="promptFileInput" type="file" accept=".prompt,.txt,.text,.json,.py,.pyw,.html,.htm,.css,.js,.mjs,.cjs,.ts,.tsx,.jsx,.md,.markdown,.csv,.xml,.yaml,.yml,.ini,.cfg,.conf,.log,.sh,.bat,.cmd,.ps1,.sql,text/plain,text/html,text/css,text/csv,application/json,application/xml,application/javascript,application/octet-stream">
  <script>
    "use strict";

    const APP_NAME = "Prompt";
    const PROMPT_FORMAT = "prompt-notepad-workspace";
    const PROMPT_VERSION = 1;
    const PREF_KEY = "prompt.html.editorPreferences.v1";
    const MODE_PROMPT = "prompt";
    const MODE_TXT = "txt";
    const MODE_MD = "md";
    const MODE_THEME_COLORS = Object.freeze({
      [MODE_PROMPT]: "#EEF6F3",
      [MODE_TXT]: "#EEF6FC",
      [MODE_MD]: "#FBF4E8"
    });
    const DEFAULT_PREFERENCES = Object.freeze({
      wordWrap: true,
      statusVisible: true,
      lineNumbers: false,
      toolbarPosition: "bottom",
      fontFamily: "ui-monospace, \"SF Mono\", \"Cascadia Mono\", \"Consolas\", monospace",
      fontSize: 14,
      fontPreset: "mono",
      lineSpacing: 1.25,
      spellCheck: false,
      autoCapitalize: "sentences",
      autoCorrect: "on",
      markdownRawView: false
    });
    const WORKSPACE_RESERVED_KEYS = new Set([
      "format",
      "version",
      "saved_at",
      "active_index",
      "window_geometry",
      "word_wrap",
      "status_bar",
      "always_on_top",
      "zoom_delta",
      "font_family",
      "font_size",
      "html_settings",
      "html_viewport",
      "tabs"
    ]);
    const FALLBACK_SYSTEM_FONTS = [
      ["-apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif", "System"],
      ["ui-monospace, \"SF Mono\", \"Cascadia Mono\", \"Consolas\", monospace", "System Mono"],
      ["ui-serif, Georgia, \"Times New Roman\", serif", "System Serif"],
      ["Arial, sans-serif", "Arial"],
      ["Avenir, sans-serif", "Avenir"],
      ["Avenir Next, sans-serif", "Avenir Next"],
      ["Baskerville, serif", "Baskerville"],
      ["Charter, serif", "Charter"],
      ["Courier, monospace", "Courier"],
      ["Courier New, monospace", "Courier New"],
      ["Georgia, serif", "Georgia"],
      ["Gill Sans, sans-serif", "Gill Sans"],
      ["Helvetica, Arial, sans-serif", "Helvetica"],
      ["Helvetica Neue, Arial, sans-serif", "Helvetica Neue"],
      ["Menlo, monospace", "Menlo"],
      ["Noteworthy, cursive", "Noteworthy"],
      ["Optima, sans-serif", "Optima"],
      ["Palatino, serif", "Palatino"],
      ["Times New Roman, serif", "Times New Roman"],
      ["Trebuchet MS, sans-serif", "Trebuchet MS"],
      ["Verdana, sans-serif", "Verdana"]
    ];

    const state = {
      mode: MODE_TXT,
      tabs: [newTabData("", "Untitled", true, false)],
      activeIndex: 0,
      workspaceName: "Untitled.txt",
      workspaceHandle: null,
      windowGeometry: "",
      sourceExtras: {},
      structureDirty: false,
      wordWrap: DEFAULT_PREFERENCES.wordWrap,
      statusVisible: DEFAULT_PREFERENCES.statusVisible,
      alwaysOnTop: false,
      zoomDelta: 0,
      fontFamily: DEFAULT_PREFERENCES.fontFamily,
      fontSize: DEFAULT_PREFERENCES.fontSize,
      fontPreset: DEFAULT_PREFERENCES.fontPreset,
      lineSpacing: DEFAULT_PREFERENCES.lineSpacing,
      lineNumbers: DEFAULT_PREFERENCES.lineNumbers,
      toolbarPosition: DEFAULT_PREFERENCES.toolbarPosition,
      spellCheck: DEFAULT_PREFERENCES.spellCheck,
      autoCapitalize: DEFAULT_PREFERENCES.autoCapitalize,
      autoCorrect: DEFAULT_PREFERENCES.autoCorrect,
      markdownRawView: DEFAULT_PREFERENCES.markdownRawView,
      lastFindText: "",
      findMatchCase: false,
      loadedFromFile: false,
      lastSavedAt: null,
      lastSavedSignature: null,
      availableFonts: FALLBACK_SYSTEM_FONTS.map(([value, label]) => ({ value, label })),
      localFontsLoaded: false
    };

    let workspaceSavePromise = null;

    const els = {
      app: document.getElementById("app"),
      tabs: document.getElementById("tabs"),
      addTab: document.getElementById("addTab"),
      editor: document.getElementById("editor"),
      markdownPreview: document.getElementById("markdownPreview"),
      mdToolbar: document.getElementById("mdToolbar"),
      documentName: document.getElementById("documentName"),
      saveState: document.getElementById("saveState"),
      statusBar: document.getElementById("statusBar"),
      statusChars: document.getElementById("statusChars"),
      statusLines: document.getElementById("statusLines"),
      sheetOverlay: document.getElementById("sheetOverlay"),
      sheet: document.querySelector("#sheetOverlay .sheet"),
      sheetHeader: document.querySelector("#sheetOverlay .sheet-title"),
      sheetTitle: document.getElementById("sheetTitle"),
      sheetList: document.getElementById("sheetList"),
      sheetClose: document.getElementById("sheetClose"),
      dialogOverlay: document.getElementById("dialogOverlay"),
      toast: document.getElementById("toast"),
      copyFlash: document.getElementById("copyFlash"),
      copyFlashText: document.getElementById("copyFlashText"),
      promptFileInput: document.getElementById("promptFileInput"),
      themeColor: document.querySelector("meta[name='theme-color']"),
      lineNumbers: document.getElementById("lineNumbers"),
      mobileActions: document.querySelector(".mobile-actions")
    };

    let loadingEditor = false;
    let toastTimer = 0;
    let copyAnimationTimer = 0;
    let lineNumberMeasureEl = null;
    let settingsPreviewTimer = 0;
    let sheetResetTimer = 0;
    let longPressTimer = 0;
    let lineNumberFrame = 0;
    let caretFrame = 0;
    let markdownCaretFrame = 0;
    let markdownToolbarFrame = 0;
    let editorLoadToken = 0;
    let editorContentRevision = 0;
    let markdownPreviewRevision = -1;
    let markdownPreviewSelection = null;
    let statusContentRevision = -1;
    let statusCharCount = 0;
    let statusLineCount = 1;
    let lastDirtyState = true;
    let sheetStartY = 0;
    let sheetCurrentY = 0;
    let sheetDragging = false;
    const SHEET_DISMISSAL_THRESHOLD = 120;

    function newTabData(text, title, manualTitle, dirty) {
      const resolvedText = String(text || "");
      const resolvedTitle = title != null ? String(title || "").trim() : titleFromText(resolvedText);
      return {
        text: resolvedText,
        title: resolvedTitle || "Untitled",
        manual_title: Boolean(manualTitle),
        cursor: 0,
        scroll: 0,
        dirty: Boolean(dirty)
      };
    }

    function titleFromText(text) {
      const firstLine = String(text || "").split(/\r?\n/)[0].trim().replace(/\s+/g, " ");
      return firstLine ? firstLine.slice(0, 80) : "Untitled";
    }

    function tabDisplayTitle(title, limit = 80) {
      const value = String(title || "Untitled").trim() || "Untitled";
      return value.length > limit ? value.slice(0, limit - 1).trimEnd() + "..." : value;
    }

    function tabTitleFloorWidth(title) {
      const value = String(title || "Untitled").trim() || "Untitled";
      const firstWord = (value.match(/\S+/) || ["Untitled"])[0];
      const visibleChars = Math.min(Math.max(firstWord.length, 4), 12);
      return Math.round(Math.max(72, Math.min(114, 34 + visibleChars * 6.5)));
    }

    function cleanFilename(name, fallback = "Untitled") {
      const cleaned = String(name || "")
        .replace(/[<>:"/\\|?*\x00-\x1f]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      return (cleaned || fallback).slice(0, 90);
    }

    function ensurePromptName(name) {
      let target = cleanFilename(name || "Untitled.prompt", "Untitled.prompt");
      if (!/\.prompt$/i.test(target)) target += ".prompt";
      return target;
    }

    function promptWorkspaceSaveName() {
      const suggested = cleanFilename(
        String(state.workspaceName || "Untitled.prompt").replace(/\.prompt$/i, ""),
        "Untitled"
      );
      return promptDialog("Save prompt file", "Prompt name:", suggested, "Save");
    }

    function currentTextExtension() {
      return cleanExtension(fileExtension(state.workspaceName || "")) || "txt";
    }

    function currentTextExtensionLabel() {
      return `.${currentTextExtension()}`;
    }

    function isPlainTextExtension(extension) {
      return ["txt", "text"].includes(cleanExtension(extension).toLowerCase());
    }

    function isMarkdownExtension(extension) {
      return ["md", "markdown"].includes(cleanExtension(extension).toLowerCase());
    }

    function isMarkdownFilename(name) {
      return isMarkdownExtension(fileExtension(name));
    }

    function ensureCurrentTextFormatName(name) {
      const extension = currentTextExtension();
      let target = cleanFilename(name || `Untitled.${extension}`, `Untitled.${extension}`);
      const suffix = `.${extension}`;
      if (!target.toLowerCase().endsWith(suffix.toLowerCase())) target += suffix;
      return target;
    }

    function ensureMarkdownName(name) {
      let target = cleanFilename(name || "Untitled.md", "Untitled.md");
      if (!/\.md$/i.test(target)) target += ".md";
      return target;
    }

    function isPromptMode() {
      return state.mode === MODE_PROMPT;
    }

    function isTxtMode() {
      return state.mode === MODE_TXT;
    }

    function isMdMode() {
      return state.mode === MODE_MD;
    }

    function isSingleFileMode() {
      return isTxtMode() || isMdMode();
    }

    function isMarkdownPreviewMode() {
      return isMdMode() && !state.markdownRawView;
    }

    function defaultDocumentName() {
      if (isPromptMode()) return "Untitled.prompt";
      if (isMdMode()) return "Untitled.md";
      return "Untitled.txt";
    }

    function fileExtension(name) {
      const base = String(name || "").split(/[\\/]/).pop() || "";
      const match = base.match(/\.([^.]+)$/);
      return match ? match[1] : "";
    }

    function cleanExtension(value) {
      return String(value || "")
        .trim()
        .replace(/^\.+/, "")
        .replace(/[<>:"/\\|?*\x00-\x1f\s.]+/g, "")
        .slice(0, 24);
    }

    function ensureCustomExtensionName(name, extension) {
      const base = cleanFilename(name || "Untitled", "Untitled").replace(/\.+$/g, "");
      const ext = cleanExtension(extension);
      return ext ? `${base}.${ext}` : null;
    }

    function txtSaveNamePrompt() {
      const suggested = cleanFilename(fileNameStem(state.workspaceName || "Untitled.txt"), "Untitled");
      return promptDialog(`Save ${currentTextExtensionLabel()} file`, "Name:", suggested, "Save");
    }

    function mdSaveNamePrompt() {
      const suggested = cleanFilename(fileNameStem(state.workspaceName || "Untitled.md"), "Untitled");
      return promptDialog("Save .md file", "Name:", suggested, "Save");
    }

    function txtSaveAsPrompt() {
      return new Promise(resolve => {
        const currentName = state.workspaceName || "Untitled.txt";
        showCustomDialog({
          title: "Save as",
          body: body => {
            body.appendChild(fieldElement("Name:", "saveAsName", fileNameStem(currentName)));
            body.appendChild(fieldElement("Ext:", "saveAsExtension", fileExtension(currentName) || "txt"));
          },
          actions: [
            { label: "Save", value: "save", primary: true },
            { label: "Cancel", value: "cancel" }
          ],
          onAction: value => {
            if (value === "cancel") {
              resolve(null);
              return true;
            }
            const name = document.getElementById("saveAsName").value;
            const extension = document.getElementById("saveAsExtension").value;
            const filename = ensureCustomExtensionName(name, extension);
            if (!filename) {
              showToast("Enter an extension.");
              return false;
            }
            resolve(filename);
            return true;
          },
          onCancel: () => resolve(null)
        });
        setTimeout(() => {
          const input = document.getElementById("saveAsName");
          if (input) {
            input.focus();
            input.select();
          }
        }, 30);
      });
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.max(min, Math.min(max, number));
    }

    function clampInteger(value, min, max, fallback) {
      return Math.round(clampNumber(value, min, max, fallback));
    }

    function markEditorContentChanged() {
      editorContentRevision = editorContentRevision >= Number.MAX_SAFE_INTEGER
        ? 1
        : editorContentRevision + 1;
    }

    function readStoredPreference(key) {
      try {
        return window.localStorage ? window.localStorage.getItem(key) : null;
      } catch (error) {
        return null;
      }
    }

    function writeStoredPreference(key, value) {
      try {
        if (!window.localStorage) return false;
        window.localStorage.setItem(key, value);
        return true;
      } catch (error) {
        return false;
      }
    }

    function removeStoredPreference(key) {
      try {
        if (window.localStorage) window.localStorage.removeItem(key);
      } catch (error) {
        // Some standalone browser contexts expose localStorage but block writes.
      }
    }

    function fontFamilyForPreset(preset) {
      if (preset === "system") return "-apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif";
      if (preset === "serif") return "ui-serif, Georgia, \"Times New Roman\", serif";
      return DEFAULT_PREFERENCES.fontFamily;
    }

    function applyFontPreset(preset) {
      state.fontPreset = ["system", "mono", "serif"].includes(preset) ? preset : "mono";
      state.fontFamily = fontFamilyForPreset(state.fontPreset);
    }

    function applyDefaultPreferences() {
      state.wordWrap = DEFAULT_PREFERENCES.wordWrap;
      state.statusVisible = DEFAULT_PREFERENCES.statusVisible;
      state.lineNumbers = DEFAULT_PREFERENCES.lineNumbers;
      state.toolbarPosition = DEFAULT_PREFERENCES.toolbarPosition;
      state.fontFamily = DEFAULT_PREFERENCES.fontFamily;
      state.fontSize = DEFAULT_PREFERENCES.fontSize;
      state.fontPreset = DEFAULT_PREFERENCES.fontPreset;
      state.lineSpacing = DEFAULT_PREFERENCES.lineSpacing;
      state.spellCheck = DEFAULT_PREFERENCES.spellCheck;
      state.autoCapitalize = DEFAULT_PREFERENCES.autoCapitalize;
      state.autoCorrect = DEFAULT_PREFERENCES.autoCorrect;
      state.markdownRawView = DEFAULT_PREFERENCES.markdownRawView;
    }

    function cssFontName(name) {
      const clean = String(name || "").replace(/"/g, "").trim();
      if (!clean) return DEFAULT_PREFERENCES.fontFamily;
      return `"${clean}", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
    }

    function fontOptionLabel(value) {
      const match = state.availableFonts.find(font => font.value === value);
      if (match) return match.label;
      return String(value || "System Mono").split(",")[0].replace(/["']/g, "").trim() || "System Mono";
    }

    async function loadLocalFontsForSettings() {
      if (state.localFontsLoaded || typeof window.queryLocalFonts !== "function") return;
      try {
        const fonts = await window.queryLocalFonts();
        const seen = new Set();
        const localFonts = fonts
          .map(font => String(font.family || "").trim())
          .filter(Boolean)
          .sort((a, b) => a.localeCompare(b))
          .map(family => ({ value: cssFontName(family), label: family }))
          .filter(font => {
            const key = font.label.toLowerCase();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
        if (localFonts.length) {
          state.availableFonts = localFonts;
        }
        state.localFontsLoaded = true;
        if (els.sheetOverlay.classList.contains("show") && els.sheetTitle.textContent === "Settings") {
          renderSettingsSheet();
        }
      } catch (error) {
        state.localFontsLoaded = true;
      }
    }

    function setEditorFont(value) {
      updatePreference(() => {
        state.fontFamily = String(value || DEFAULT_PREFERENCES.fontFamily);
        state.fontPreset = state.fontFamily === DEFAULT_PREFERENCES.fontFamily ? "mono" : "custom";
      });
    }

    function loadPreferences() {
      try {
        const raw = readStoredPreference(PREF_KEY);
        if (!raw) return;
        const prefs = JSON.parse(raw);
        if (typeof prefs.wordWrap === "boolean") state.wordWrap = prefs.wordWrap;
        if (typeof prefs.statusVisible === "boolean") state.statusVisible = prefs.statusVisible;
        if (typeof prefs.lineNumbers === "boolean") state.lineNumbers = prefs.lineNumbers;
        if (prefs.toolbarPosition === "top" || prefs.toolbarPosition === "bottom") {
          state.toolbarPosition = prefs.toolbarPosition;
        }
        const knownFontPreset = typeof prefs.fontPreset === "string" && ["system", "mono", "serif"].includes(prefs.fontPreset);
        if (knownFontPreset) {
          applyFontPreset(prefs.fontPreset);
        }
        if (typeof prefs.fontFamily === "string" && prefs.fontFamily && (!knownFontPreset || prefs.fontPreset === "custom")) {
          state.fontFamily = prefs.fontFamily;
          if (prefs.fontPreset === "custom" || !knownFontPreset) {
            state.fontPreset = state.fontFamily === DEFAULT_PREFERENCES.fontFamily ? "mono" : "custom";
          }
        }
        state.fontSize = clampInteger(prefs.fontSize, 8, 45, state.fontSize);
        state.lineSpacing = clampNumber(prefs.lineSpacing, 1.2, 1.9, state.lineSpacing);
        if (Number(prefs.lineSpacing) === 1.42) state.lineSpacing = DEFAULT_PREFERENCES.lineSpacing;
        if (typeof prefs.spellCheck === "boolean") state.spellCheck = prefs.spellCheck;
        if (["none", "sentences", "words", "characters"].includes(prefs.autoCapitalize)) {
          state.autoCapitalize = prefs.autoCapitalize;
        }
        if (prefs.autoCorrect === "on" || prefs.autoCorrect === "off") state.autoCorrect = prefs.autoCorrect;
        if (typeof prefs.markdownRawView === "boolean") state.markdownRawView = prefs.markdownRawView;
      } catch (error) {
        removeStoredPreference(PREF_KEY);
      }
    }

    function savePreferences() {
      const prefs = {
        wordWrap: state.wordWrap,
        statusVisible: state.statusVisible,
        lineNumbers: state.lineNumbers,
        toolbarPosition: state.toolbarPosition,
        fontPreset: state.fontPreset,
        fontFamily: state.fontFamily,
        fontSize: state.fontSize,
        lineSpacing: state.lineSpacing,
        spellCheck: state.spellCheck,
        autoCapitalize: state.autoCapitalize,
        autoCorrect: state.autoCorrect,
        markdownRawView: state.markdownRawView
      };
      if (!writeStoredPreference(PREF_KEY, JSON.stringify(prefs))) {
        showToast("Settings could not be stored in this browser.");
      }
    }

    function applyEditorPreferences() {
      els.editor.spellcheck = state.spellCheck;
      els.editor.setAttribute("spellcheck", state.spellCheck ? "true" : "false");
      els.editor.setAttribute("autocapitalize", state.autoCapitalize);
      els.editor.setAttribute("autocorrect", state.autoCorrect);
    }

    function updatePreference(mutator) {
      mutator();
      state.zoomDelta = 0;
      savePreferences();
      render();
    }

    function editorTextSizePx() {
      return clampInteger(state.fontSize, 8, 45, 14);
    }

    function installMobileViewportGuards() {
      const stopGestureZoom = event => event.preventDefault();
      document.addEventListener("gesturestart", stopGestureZoom, { passive: false });
      document.addEventListener("gesturechange", stopGestureZoom, { passive: false });
      document.addEventListener("gestureend", stopGestureZoom, { passive: false });
      document.addEventListener("touchmove", event => {
        if (event.touches && event.touches.length > 1) event.preventDefault();
      }, { passive: false });
      document.addEventListener("wheel", event => {
        if (event.ctrlKey) event.preventDefault();
      }, { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener("touchend", event => {
        const now = Date.now();
        if (now - lastTouchEnd < 320 && event.target !== els.editor) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    }

    function updateViewportMetrics() {
      const viewport = window.visualViewport;
      const visibleHeight = viewport ? viewport.height : window.innerHeight;
      document.documentElement.style.setProperty("--app-height", `${Math.max(180, Math.round(visibleHeight))}px`);
      document.documentElement.style.setProperty("--keyboard-inset", "0px");

      const layoutHeight = window.innerHeight || visibleHeight;
      const keyboardOpen = Boolean(
        viewport &&
        document.activeElement === els.editor &&
        layoutHeight - visibleHeight > 110
      );
      document.body.classList.toggle("keyboard-open", keyboardOpen);
      scheduleLineNumberUpdate();
      scheduleCaretVisible();
    }

    function keepCaretVisible() {
      if (document.activeElement !== els.editor) return;
      const style = window.getComputedStyle(els.editor);
      const lineHeight = Number.parseFloat(style.lineHeight) || 22;
      const paddingTop = Number.parseFloat(style.paddingTop) || 0;
      const paddingBottom = Number.parseFloat(style.paddingBottom) || 0;
      const lineIndex = lineIndexAt(els.editor.value, els.editor.selectionStart || 0);
      const caretY = paddingTop + lineIndex * lineHeight;
      const top = els.editor.scrollTop;
      const bottom = top + els.editor.clientHeight - paddingBottom - lineHeight * 2;

      if (caretY > bottom) {
        els.editor.scrollTop = Math.max(0, caretY - els.editor.clientHeight + paddingBottom + lineHeight * 3);
      } else if (caretY < top + lineHeight) {
        els.editor.scrollTop = Math.max(0, caretY - lineHeight);
      }
    }

    function currentTab() {
      return state.tabs[state.activeIndex] || null;
    }

    function countLines(text) {
      const value = String(text || "");
      let count = 1;
      for (let index = value.indexOf("\n"); index !== -1; index = value.indexOf("\n", index + 1)) {
        count += 1;
      }
      return count;
    }

    function lineIndexAt(text, position) {
      const value = String(text || "");
      const end = Math.max(0, Math.min(position, value.length));
      let line = 0;
      for (let index = value.indexOf("\n"); index !== -1 && index < end; index = value.indexOf("\n", index + 1)) {
        line += 1;
      }
      return line;
    }

    function lineNumbersVisible() {
      return state.lineNumbers && !isMarkdownPreviewMode();
    }

    function scheduleLineNumberUpdate() {
      if (!lineNumbersVisible()) return;
      if (lineNumberFrame) return;
      lineNumberFrame = requestAnimationFrame(() => {
        lineNumberFrame = 0;
        updateLineNumbers();
      });
    }

    function scheduleCaretVisible() {
      if (caretFrame) return;
      caretFrame = requestAnimationFrame(() => {
        caretFrame = 0;
        keepCaretVisible();
      });
    }

    function workspaceSaveSignature() {
      const tabs = state.tabs.map((tab, index) => {
        const activeEditorText = index === state.activeIndex && !loadingEditor ? els.editor.value : tab.text;
        const text = String(activeEditorText || "");
        const manualTitle = Boolean(tab.manual_title);
        const title = manualTitle ? String(tab.title || "Untitled") : titleFromText(text);
        return {
          title: title || "Untitled",
          manual_title: manualTitle,
          text
        };
      });
      return JSON.stringify({ mode: MODE_PROMPT, tabs });
    }

    function txtSaveSignature() {
      const tab = currentTab();
      const text = !loadingEditor ? els.editor.value : (tab ? tab.text : "");
      return JSON.stringify({ mode: MODE_TXT, text: String(text || "") });
    }

    function mdSaveSignature() {
      const tab = currentTab();
      const text = !loadingEditor ? els.editor.value : (tab ? tab.text : "");
      return JSON.stringify({ mode: MODE_MD, text: String(text || "") });
    }

    function activeSaveSignature() {
      if (isTxtMode()) return txtSaveSignature();
      if (isMdMode()) return mdSaveSignature();
      return workspaceSaveSignature();
    }

    function isDirty() {
      if (typeof state.lastSavedSignature === "string") {
        return activeSaveSignature() !== state.lastSavedSignature;
      }
      return state.structureDirty || state.tabs.some(tab => tab.dirty);
    }

    function storeCurrentTab() {
      const tab = currentTab();
      if (!tab) return;
      if (isMarkdownPreviewMode()) {
        syncEditorStateFromMarkdownPreview();
      }
      const previousText = tab.text;
      tab.text = els.editor.value;
      tab.cursor = els.editor.selectionStart || 0;
      tab.scroll = els.editor.scrollTop || 0;
      if (!tab.manual_title) tab.title = titleFromText(tab.text);
      if (tab.text !== previousText) {
        tab.dirty = true;
        markEditorContentChanged();
      }
    }

    function loadTabIntoEditor(index) {
      const tab = state.tabs[index];
      if (!tab) return;
      const loadToken = ++editorLoadToken;
      loadingEditor = true;
      els.editor.value = tab.text;
      markEditorContentChanged();
      const cursor = Math.max(0, Math.min(tab.cursor || 0, tab.text.length));
      requestAnimationFrame(() => {
        if (loadToken !== editorLoadToken) return;
        els.editor.setSelectionRange(cursor, cursor);
        els.editor.scrollTop = tab.scroll || 0;
        if (lineNumbersVisible()) els.lineNumbers.scrollTop = els.editor.scrollTop;
        loadingEditor = false;
        syncMarkdownPreview();
        updateLineNumbers();
        updateStatus();
        scheduleMarkdownToolbarState();
        keepCaretVisible();
      });
    }

    function switchToTab(index) {
      if (!isPromptMode()) return;
      if (index < 0 || index >= state.tabs.length || index === state.activeIndex) return;
      storeCurrentTab();
      state.activeIndex = index;
      loadTabIntoEditor(index);
      render();
      els.editor.focus({ preventScroll: true });
    }

    function addTab(text = "", title = null, manualTitle = false, makeActive = true, markDirty = true) {
      if (!isPromptMode()) return null;
      storeCurrentTab();
      const tab = newTabData(text, title, manualTitle, markDirty);
      state.tabs.push(tab);
      if (markDirty) state.structureDirty = true;
      if (makeActive) {
        state.activeIndex = state.tabs.length - 1;
        loadTabIntoEditor(state.activeIndex);
      }
      render();
      return tab;
    }

    async function closeTab(index) {
      if (!isPromptMode()) return;
      if (index < 0 || index >= state.tabs.length) return;
      storeCurrentTab();

      if (state.tabs.length === 1) {
        if (isDirty()) {
          const action = await confirmUnsaved(
            "Close tab?",
            "This is the last open tab. Save changes to the prompt file before clearing it?"
          );
          if (action === "cancel") return;
          if (action === "save") {
            const saved = await saveWorkspace();
            if (!saved) return;
          }
        }
        state.tabs = [newTabData("", "Untitled", false, false)];
        state.activeIndex = 0;
        state.workspaceName = "Untitled.prompt";
        state.workspaceHandle = null;
        state.loadedFromFile = false;
        state.structureDirty = false;
        loadTabIntoEditor(0);
        markClean(null);
        render();
        return;
      }

      if (isDirty()) {
        const action = await confirmUnsaved(
          "Close tab?",
          "Closing this tab will remove it from the workspace. Save the workspace before closing it?"
        );
        if (action === "cancel") return;
        if (action === "save") {
          const saved = await saveWorkspace();
          if (!saved) return;
        }
      }

      state.tabs.splice(index, 1);
      if (state.activeIndex >= state.tabs.length) state.activeIndex = state.tabs.length - 1;
      if (state.activeIndex < 0) state.activeIndex = 0;
      state.structureDirty = true;
      loadTabIntoEditor(state.activeIndex);
      render();
    }

    async function closeOtherTabs(index) {
      if (!isPromptMode()) return;
      if (index < 0 || index >= state.tabs.length || state.tabs.length < 2) return;
      storeCurrentTab();
      if (isDirty()) {
        const action = await confirmUnsaved(
          "Close other tabs?",
          "Closing other tabs will remove them from the workspace. Save the workspace before closing them?"
        );
        if (action === "cancel") return;
        if (action === "save") {
          const saved = await saveWorkspace();
          if (!saved) return;
        }
      }
      const kept = state.tabs[index];
      state.tabs = [kept];
      state.activeIndex = 0;
      state.structureDirty = true;
      loadTabIntoEditor(0);
      render();
    }

    async function renameTab(index) {
      if (!isPromptMode()) return;
      const tab = state.tabs[index];
      if (!tab) return;
      const name = await promptDialog("Rename tab", "Tab name:", tab.title, "Save");
      if (name == null) return;
      tab.title = String(name).trim() || "Untitled";
      tab.manual_title = true;
      tab.dirty = true;
      state.structureDirty = true;
      render();
    }

    function useAutoName(index) {
      if (!isPromptMode()) return;
      const tab = state.tabs[index];
      if (!tab) return;
      storeCurrentTab();
      tab.manual_title = false;
      tab.title = titleFromText(tab.text);
      tab.dirty = true;
      state.structureDirty = true;
      render();
    }

    function renderTabs() {
      if (!isPromptMode()) {
        els.tabs.innerHTML = "";
        return;
      }
      els.tabs.innerHTML = "";
      state.tabs.forEach((tab, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.index = String(index);

        const label = document.createElement("span");
        label.className = "tab-label";
        button.appendChild(label);
        syncTabButton(index, button);

        button.addEventListener("click", () => switchToTab(index));
        button.addEventListener("dblclick", () => renameTab(index));
        button.addEventListener("contextmenu", event => {
          event.preventDefault();
          switchToTab(index);
          showTabActions(index);
        });
        button.addEventListener("touchstart", () => {
          clearTimeout(longPressTimer);
          longPressTimer = window.setTimeout(() => {
            switchToTab(index);
            showTabActions(index);
          }, 560);
        }, { passive: true });
        button.addEventListener("touchend", () => clearTimeout(longPressTimer));
        button.addEventListener("touchmove", () => clearTimeout(longPressTimer), { passive: true });

        els.tabs.appendChild(button);
      });

      const active = els.tabs.querySelector(".tab.active");
      if (active) {
        requestAnimationFrame(() => active.scrollIntoView({ block: "nearest", inline: "nearest" }));
      }
    }

    function syncTabButton(index, button = null) {
      const tab = state.tabs[index];
      const target = button || els.tabs.querySelector(`.tab[data-index="${index}"]`);
      if (!tab || !target) return;
      target.className = "tab" + (index === state.activeIndex ? " active" : "") + (tab.dirty ? " dirty" : "");
      target.setAttribute("role", "tab");
      target.setAttribute("aria-selected", index === state.activeIndex ? "true" : "false");
      target.setAttribute("aria-label", `${tab.title}. Long press for tab actions.`);
      target.title = tab.title;
      target.style.setProperty("--tab-title-floor", `${tabTitleFloorWidth(tab.title)}px`);
      const label = target.querySelector(".tab-label");
      if (label) label.textContent = tabDisplayTitle(tab.title);
    }

    function updateDocumentChrome(dirty = isDirty()) {
      lastDirtyState = Boolean(dirty);
      const tab = currentTab();
      const displayName = state.workspaceName || defaultDocumentName();
      const titleName = isSingleFileMode() ? fileNameStem(displayName) : (tab ? tab.title : "Untitled");
      document.title = (dirty ? "* " : "") + titleName + " - " + APP_NAME;
      els.documentName.textContent = displayName;
      return dirty;
    }

    function render() {
      renderTabs();
      const dirty = updateDocumentChrome();
      els.app.classList.toggle("txt-mode", isTxtMode());
      els.app.classList.toggle("prompt-mode", isPromptMode());
      els.app.classList.toggle("md-mode", isMdMode());
      els.app.classList.toggle("md-preview", isMarkdownPreviewMode());
      els.app.classList.toggle("md-raw", isMdMode() && state.markdownRawView);
      if (els.themeColor) {
        els.themeColor.setAttribute("content", MODE_THEME_COLORS[state.mode] || MODE_THEME_COLORS[MODE_TXT]);
      }
      els.addTab.hidden = !isPromptMode();
      els.statusBar.hidden = !state.statusVisible;
      els.app.classList.toggle("toolbar-top", state.toolbarPosition === "top");
      els.app.classList.toggle("status-hidden", !state.statusVisible);
      els.mobileActions.setAttribute(
        "aria-label",
        state.toolbarPosition === "top" ? "App actions, top toolbar" : "App actions, bottom toolbar"
      );
      const previewingMarkdown = isMarkdownPreviewMode();
      els.editor.hidden = previewingMarkdown;
      els.markdownPreview.hidden = !previewingMarkdown;
      els.markdownPreview.contentEditable = previewingMarkdown ? "true" : "false";
      els.markdownPreview.setAttribute("spellcheck", state.spellCheck ? "true" : "false");
      els.markdownPreview.setAttribute("autocapitalize", state.autoCapitalize);
      els.markdownPreview.setAttribute("autocorrect", state.autoCorrect);
      els.mdToolbar.setAttribute("aria-hidden", isMdMode() ? "false" : "true");
      if (previewingMarkdown) syncMarkdownPreview();
      els.editor.classList.toggle("no-wrap", !state.wordWrap);
      els.editor.parentElement.classList.toggle("show-line-numbers", lineNumbersVisible());
      els.editor.setAttribute("wrap", state.wordWrap ? "soft" : "off");
      els.editor.style.fontSize = editorTextSizePx() + "px";
      els.editor.style.lineHeight = state.lineSpacing.toFixed(2);
      els.editor.style.fontFamily = state.fontFamily;
      els.markdownPreview.style.fontSize = Math.max(14, editorTextSizePx() + 2) + "px";
      els.markdownPreview.style.lineHeight = Math.max(1.42, state.lineSpacing + 0.28).toFixed(2);
      els.lineNumbers.style.fontSize = editorTextSizePx() + "px";
      els.lineNumbers.style.lineHeight = state.lineSpacing.toFixed(2);
      els.lineNumbers.style.fontFamily = state.fontFamily;
      applyEditorPreferences();
      updateLineNumbers();
      updateStatus(dirty);
      scheduleMarkdownToolbarState();
    }

    function updateLineNumbers() {
      if (!lineNumbersVisible()) {
        if (els.lineNumbers.childNodes.length) els.lineNumbers.replaceChildren();
        return;
      }

      const editorStyle = window.getComputedStyle(els.editor);
      const lineHeight = Number.parseFloat(editorStyle.lineHeight) || editorTextSizePx() * state.lineSpacing;
      const paddingTop = Number.parseFloat(editorStyle.paddingTop) || 0;
      const paddingRight = Number.parseFloat(editorStyle.paddingRight) || 0;
      const paddingBottom = Number.parseFloat(editorStyle.paddingBottom) || 0;
      const paddingLeft = Number.parseFloat(editorStyle.paddingLeft) || 0;
      const contentWidth = Math.max(1, els.editor.clientWidth - paddingLeft - paddingRight);
      const lines = els.editor.value.split("\n");
      const fragment = document.createDocumentFragment();
      const measure = lineNumberMeasure();

      els.lineNumbers.style.paddingTop = `${paddingTop}px`;
      els.lineNumbers.style.paddingBottom = `${paddingBottom}px`;

      measure.style.width = `${contentWidth}px`;
      measure.style.fontFamily = editorStyle.fontFamily;
      measure.style.fontSize = editorStyle.fontSize;
      measure.style.fontWeight = editorStyle.fontWeight;
      measure.style.fontStyle = editorStyle.fontStyle;
      measure.style.lineHeight = editorStyle.lineHeight;
      measure.style.letterSpacing = editorStyle.letterSpacing;
      measure.style.wordSpacing = editorStyle.wordSpacing;
      measure.style.tabSize = editorStyle.tabSize || "4";
      measure.style.whiteSpace = state.wordWrap ? "pre-wrap" : "pre";
      measure.style.overflowWrap = state.wordWrap ? "break-word" : "normal";

      lines.forEach((line, index) => {
        const row = document.createElement("span");
        row.className = "line-number-row";
        row.textContent = String(index + 1);

        let rowHeight = lineHeight;
        if (state.wordWrap) {
          measure.textContent = line || "\u00a0";
          rowHeight = Math.max(lineHeight, measure.getBoundingClientRect().height || lineHeight);
        }
        row.style.height = `${rowHeight}px`;
        fragment.appendChild(row);
      });

      els.lineNumbers.replaceChildren(fragment);
      els.lineNumbers.scrollTop = els.editor.scrollTop;
    }

    function lineNumberMeasure() {
      if (!lineNumberMeasureEl) {
        lineNumberMeasureEl = document.createElement("div");
        lineNumberMeasureEl.className = "line-number-measure";
        els.editor.parentElement.appendChild(lineNumberMeasureEl);
      }
      return lineNumberMeasureEl;
    }

    function updateStatus(dirty = lastDirtyState) {
      if (statusContentRevision !== editorContentRevision) {
        const text = els.editor.value;
        statusCharCount = text.length;
        statusLineCount = countLines(text);
        statusContentRevision = editorContentRevision;
      }
      els.statusChars.textContent = `${statusCharCount.toLocaleString()} ${statusCharCount === 1 ? "character" : "characters"}`;
      els.statusLines.textContent = `${statusLineCount.toLocaleString()} ${statusLineCount === 1 ? "line" : "lines"}`;
      updateSaveStatus(dirty);
    }

    function formatSavedClock(date) {
      const hours = date.getHours();
      const hour12 = hours % 12 || 12;
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${hour12}:${minutes}`;
    }

    function updateSaveStatus(dirty = lastDirtyState) {
      lastDirtyState = Boolean(dirty);
      const hasSavedTime = state.lastSavedAt instanceof Date && Number.isFinite(state.lastSavedAt.getTime());
      els.saveState.textContent = hasSavedTime ? `Saved ${formatSavedClock(state.lastSavedAt)}` : "Not saved";
      els.saveState.classList.toggle("clean", hasSavedTime && !dirty);
      els.saveState.classList.toggle("dirty", dirty || !hasSavedTime);
      els.saveState.setAttribute(
        "aria-label",
        hasSavedTime
          ? (dirty ? `Unsaved changes since ${formatSavedClock(state.lastSavedAt)}` : `Saved at ${formatSavedClock(state.lastSavedAt)}`)
          : (isPromptMode()
            ? "This workspace has not been saved as a prompt file"
            : (isMdMode() ? "This Markdown file has not been saved" : "This text file has not been saved"))
      );
    }

    function handleEditorInput() {
      if (loadingEditor) return;
      syncEditorStateFromEditor();
      scheduleCaretVisible();
    }

    function syncEditorStateFromEditor() {
      const tab = currentTab();
      if (!tab) return false;
      const previousTitle = tab.title;
      const previousDirty = tab.dirty;
      const previousText = tab.text;
      tab.text = els.editor.value;
      tab.cursor = els.editor.selectionStart || 0;
      tab.scroll = els.editor.scrollTop || 0;
      if (tab.text !== previousText) {
        tab.dirty = true;
        markEditorContentChanged();
      }
      if (!tab.manual_title) tab.title = titleFromText(tab.text);
      if (tab.title !== previousTitle || tab.dirty !== previousDirty) syncTabButton(state.activeIndex);
      const dirty = updateDocumentChrome();
      if (isMdMode()) syncMarkdownPreview();
      scheduleLineNumberUpdate();
      scheduleMarkdownToolbarState();
      updateStatus(dirty);
      return tab.text !== previousText;
    }

    function syncEditorStateFromMarkdownPreview() {
      if (!isMarkdownPreviewMode() || loadingEditor) return false;
      const tab = currentTab();
      if (!tab) return false;
      const previousTitle = tab.title;
      const previousDirty = tab.dirty;
      const previousText = tab.text;
      const text = markdownFromPreview();
      els.editor.value = text;
      tab.text = text;
      tab.previewScroll = els.markdownPreview.scrollTop || 0;
      if (tab.text !== previousText) {
        tab.dirty = true;
        markEditorContentChanged();
        markdownPreviewRevision = editorContentRevision;
      }
      if (!tab.manual_title) tab.title = titleFromText(tab.text);
      if (tab.title !== previousTitle || tab.dirty !== previousDirty) syncTabButton(state.activeIndex);
      markdownPreviewSelection = null;
      const dirty = updateDocumentChrome();
      updateStatus(dirty);
      scheduleMarkdownToolbarState();
      return tab.text !== previousText;
    }

    function markClean(savedAt = state.lastSavedAt, savedSignature = activeSaveSignature()) {
      state.lastSavedAt = savedAt instanceof Date && Number.isFinite(savedAt.getTime())
        ? new Date(savedAt.getTime())
        : null;
      state.lastSavedSignature = savedSignature;
      const clean = activeSaveSignature() === state.lastSavedSignature;
      state.structureDirty = !clean;
      if (clean) state.tabs.forEach(tab => { tab.dirty = false; });
      render();
    }

    function captureMarkdownPreviewSelection() {
      if (!isMarkdownPreviewMode()) return null;
      const selection = window.getSelection ? window.getSelection() : null;
      if (!selection || selection.rangeCount < 1) return null;
      const range = selection.getRangeAt(0);
      if (!els.markdownPreview.contains(range.commonAncestorContainer)) return null;
      if (selection.isCollapsed) {
        const caret = locateMarkdownPreviewCaret();
        if (!caret) return null;
        const source = els.editor.value || "";
        markdownPreviewSelection = {
          text: "",
          revision: editorContentRevision,
          sourceStart: caret.sourceStart,
          sourceEnd: caret.sourceStart,
          lineStart: markdownLineStart(source, caret.sourceStart),
          lineEnd: markdownLineEnd(source, caret.sourceStart)
        };
        return markdownPreviewSelection;
      }
      const selectedText = selection.toString();
      const located = locateMarkdownSourceSelection(selectedText);
      if (!located) return null;
      markdownPreviewSelection = Object.assign({
        text: selectedText,
        revision: editorContentRevision
      }, located);
      return markdownPreviewSelection;
    }

    function locateMarkdownSourceSelection(selectedText) {
      const source = els.editor.value || "";
      const text = String(selectedText || "");
      if (!text.trim()) return null;

      let start = source.indexOf(text);
      let end = start >= 0 ? start + text.length : -1;

      if (start < 0) {
        const compact = text.trim().split(/\s+/).filter(Boolean);
        if (compact.length) {
          const pattern = compact.map(part => escapeRegExp(part)).join("[\\s\\S]{0,80}?");
          const match = source.match(new RegExp(pattern));
          if (match) {
            start = match.index;
            end = start + match[0].length;
          }
        }
      }

      if (start < 0 || end < start) return null;
      return {
        sourceStart: start,
        sourceEnd: end,
        lineStart: markdownLineStart(source, start),
        lineEnd: markdownLineEnd(source, Math.max(start, end - 1))
      };
    }

    function markdownSourceSelection() {
      const source = els.editor.value || "";
      if (!isMarkdownPreviewMode() || document.activeElement === els.editor) {
        return {
          start: clampInteger(els.editor.selectionStart || 0, 0, source.length, source.length),
          end: clampInteger(els.editor.selectionEnd || 0, 0, source.length, source.length),
          fromPreview: false
        };
      }

      const captured = captureMarkdownPreviewSelection() || markdownPreviewSelection;
      if (captured && captured.revision === editorContentRevision) {
        return {
          start: clampInteger(captured.sourceStart, 0, source.length, 0),
          end: clampInteger(captured.sourceEnd, 0, source.length, 0),
          fromPreview: true
        };
      }

      const caret = locateMarkdownPreviewCaret();
      if (caret) {
        return {
          start: clampInteger(caret.sourceStart, 0, source.length, source.length),
          end: clampInteger(caret.sourceStart, 0, source.length, source.length),
          fromPreview: true
        };
      }

      const cursor = clampInteger(els.editor.selectionStart || source.length, 0, source.length, source.length);
      return { start: cursor, end: cursor, fromPreview: true };
    }

    function locateMarkdownPreviewCaret() {
      if (!isMarkdownPreviewMode()) return null;
      const selection = window.getSelection ? window.getSelection() : null;
      if (!selection || selection.rangeCount < 1 || !selection.isCollapsed) return null;
      const range = selection.getRangeAt(0);
      if (!els.markdownPreview.contains(range.commonAncestorContainer)) return null;

      const markerText = "\uE010MD_CURSOR\uE011";
      const marker = document.createTextNode(markerText);
      const restoreRange = range.cloneRange();
      range.insertNode(marker);
      const markdown = markdownFromPreview();
      const index = markdown.indexOf(markerText);
      if (marker.parentNode) marker.parentNode.removeChild(marker);
      selection.removeAllRanges();
      selection.addRange(restoreRange);
      return index >= 0 ? { sourceStart: index } : null;
    }

    function replaceMarkdownSource(start, end, replacement, selectStart = null, selectEnd = null) {
      const source = els.editor.value || "";
      const safeStart = clampInteger(start, 0, source.length, 0);
      const safeEnd = clampInteger(end, safeStart, source.length, safeStart);
      const insert = String(replacement || "");
      els.editor.value = source.slice(0, safeStart) + insert + source.slice(safeEnd);
      const selectionStart = selectStart == null ? safeStart + insert.length : clampInteger(selectStart, 0, els.editor.value.length, safeStart + insert.length);
      const selectionEnd = selectEnd == null ? selectionStart : clampInteger(selectEnd, selectionStart, els.editor.value.length, selectionStart);
      els.editor.setSelectionRange(selectionStart, selectionEnd);
      markdownPreviewSelection = null;
      syncEditorStateFromEditor();
      if (!isMarkdownPreviewMode()) {
        els.editor.focus({ preventScroll: true });
      }
    }

    function markdownSelectionRange() {
      if (!isMarkdownPreviewMode()) return null;
      const selection = window.getSelection ? window.getSelection() : null;
      if (!selection || selection.rangeCount < 1) return null;
      const range = selection.getRangeAt(0);
      return els.markdownPreview.contains(range.commonAncestorContainer) ? range : null;
    }

    function markdownSelectionElement() {
      const range = markdownSelectionRange();
      if (!range) return null;
      const selection = window.getSelection ? window.getSelection() : null;
      const node = (selection && selection.anchorNode) || range.commonAncestorContainer;
      const element = node && node.nodeType === Node.ELEMENT_NODE ? node : node && node.parentElement;
      return element && els.markdownPreview.contains(element) ? element : null;
    }

    function currentMarkdownLinkElement(target = null) {
      const element = target && target.nodeType === Node.ELEMENT_NODE ? target : markdownSelectionElement();
      if (!element || !element.closest) return null;
      const link = element.closest("a[data-md-link], a[href]");
      return link && els.markdownPreview.contains(link) ? link : null;
    }

    function currentMarkdownImageElement(target = null) {
      const element = target && target.nodeType === Node.ELEMENT_NODE ? target : markdownSelectionElement();
      if (!element || !element.closest) return null;
      const candidate = element.closest("img, .md-image-frame");
      if (!candidate || !els.markdownPreview.contains(candidate)) return null;
      return candidate.tagName && candidate.tagName.toLowerCase() === "img"
        ? candidate
        : candidate.querySelector("img");
    }

    function currentMarkdownTableCell(target = null) {
      const element = target && target.nodeType === Node.ELEMENT_NODE ? target : markdownSelectionElement();
      if (!element || !element.closest) return null;
      const cell = element.closest("td, th");
      return cell && els.markdownPreview.contains(cell) ? cell : null;
    }

    function currentMarkdownTable(target = null) {
      const cell = currentMarkdownTableCell(target);
      if (cell) return cell.closest("table");
      const element = target && target.nodeType === Node.ELEMENT_NODE ? target : markdownSelectionElement();
      if (!element || !element.closest) return null;
      const table = element.closest("table");
      return table && els.markdownPreview.contains(table) ? table : null;
    }

    function markdownToolbarContext() {
      if (!isMdMode()) return {};
      if (isMarkdownPreviewMode()) {
        const element = markdownSelectionElement();
        if (!element) return {};
        return {
          heading: Boolean(element.closest("h1, h2, h3, h4, h5, h6")),
          style: Boolean(element.closest("strong, b, em, i, u, del, s, strike, code")),
          link: Boolean(element.closest("a[data-md-link], a[href]")),
          list: Boolean(element.closest("li, ul, ol")),
          quote: Boolean(element.closest("blockquote")),
          insert: Boolean(element.closest("table, pre, .md-image-frame, img, hr"))
        };
      }

      const source = els.editor.value || "";
      const start = clampInteger(els.editor.selectionStart || 0, 0, source.length, 0);
      const end = clampInteger(els.editor.selectionEnd || start, start, source.length, start);
      const line = source.slice(markdownLineStart(source, start), markdownLineEnd(source, Math.max(start, end)));
      const selected = source.slice(start, end);
      const styleNeedle = selected || line;
      return {
        heading: /^ {0,3}#{1,6}\s+/.test(line),
        style: /(\*\*|__|~~|`|<u>)/i.test(styleNeedle),
        link: /\[[^\]]+\]\([^)]+\)/.test(styleNeedle),
        list: /^\s*(?:[-+*]|\d+[.)])\s+(?:\[[ xX]\]\s+)?/.test(line),
        quote: /^ {0,3}>\s?/.test(line),
        insert: /^ {0,3}(?:---+|\*\*\*+|___+)\s*$/.test(line) || /\|/.test(line)
      };
    }

    function scheduleMarkdownToolbarState() {
      if (markdownToolbarFrame) return;
      markdownToolbarFrame = requestAnimationFrame(() => {
        markdownToolbarFrame = 0;
        updateMarkdownToolbarState();
      });
    }

    function updateMarkdownToolbarState() {
      if (!els.mdToolbar) return;
      const context = markdownToolbarContext();
      els.mdToolbar.querySelectorAll("[data-md-tool]").forEach(button => {
        const active = Boolean(context[button.dataset.mdTool]);
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function markdownBlankParagraph() {
      const paragraph = document.createElement("p");
      paragraph.appendChild(document.createElement("br"));
      return paragraph;
    }

    function insertMarkdownNodeAfter(reference, node) {
      if (!reference || !reference.parentNode || !node) return;
      if (reference.nextSibling) reference.parentNode.insertBefore(node, reference.nextSibling);
      else reference.parentNode.appendChild(node);
    }

    function setMarkdownCaretInElement(element, atEnd = false) {
      if (!element) return;
      const selection = window.getSelection ? window.getSelection() : null;
      if (!selection) return;
      els.markdownPreview.focus({ preventScroll: true });
      const range = document.createRange();
