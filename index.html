    function hideSheet() {
      clearTimeout(settingsPreviewTimer);
      clearTimeout(sheetResetTimer);
      sheetDragging = false;
      els.sheet.style.transition = "";
      els.sheetOverlay.classList.remove("previewing-settings");
      els.sheet.classList.remove("previewing-settings");
      els.sheetOverlay.classList.remove("show");
      els.sheetOverlay.setAttribute("aria-hidden", "true");
      document.querySelectorAll("[data-menu]").forEach(button => button.classList.remove("active"));
      sheetResetTimer = window.setTimeout(() => {
        if (!els.sheetOverlay.classList.contains("show")) els.sheet.style.transform = "";
      }, 500);
    }

    function installSheetGestures() {
      els.sheetHeader.addEventListener("touchstart", event => {
        if (!els.sheetOverlay.classList.contains("show") || event.target.closest(".sheet-close")) return;
        sheetStartY = event.touches[0].clientY;
        sheetCurrentY = sheetStartY;
        sheetDragging = true;
        clearTimeout(sheetResetTimer);
        els.sheet.style.transition = "none";
      }, { passive: true });

      els.sheetHeader.addEventListener("touchmove", event => {
        if (!sheetDragging) return;
        sheetCurrentY = event.touches[0].clientY;
        const deltaY = sheetCurrentY - sheetStartY;
        if (deltaY > 0) {
          event.preventDefault();
          els.sheet.style.transform = `translateY(${deltaY}px)`;
        }
      }, { passive: false });

      const finishDrag = () => {
        if (!sheetDragging) return;
        sheetDragging = false;
        els.sheet.style.transition = "";
        const deltaY = sheetCurrentY - sheetStartY;
        if (deltaY > SHEET_DISMISSAL_THRESHOLD) {
          hideSheet();
        } else {
          els.sheet.style.transform = "";
        }
      };

      els.sheetHeader.addEventListener("touchend", finishDrag);
      els.sheetHeader.addEventListener("touchcancel", finishDrag);
    }

    function promptDialog(title, label, value, primaryLabel) {
      return new Promise(resolve => {
        showCustomDialog({
          title,
          body: body => body.appendChild(fieldElement(label, "promptInput", value || "")),
          actions: [
            { label: primaryLabel || "OK", value: "ok", primary: true },
            { label: "Cancel", value: "cancel" }
          ],
          onAction: action => {
            if (action === "cancel") {
              resolve(null);
            } else {
              resolve(document.getElementById("promptInput").value);
            }
            return true;
          },
          onCancel: () => resolve(null)
        });
        setTimeout(() => {
          const input = document.getElementById("promptInput");
          if (input) {
            input.focus();
            input.select();
          }
        }, 30);
      });
    }

    function confirmUnsaved(title, message, showApply = false) {
      return new Promise(resolve => {
        showCustomDialog({
          title,
          body: body => {
            const text = document.createElement("div");
            text.textContent = message;
            body.appendChild(text);
            if (showApply) {
              const line = document.createElement("label");
              line.className = "checkbox-line";
              line.innerHTML = `<input type="checkbox" id="applyAll"> Apply to all`;
              body.appendChild(line);
            }
          },
          actions: [
            { label: "Save changes", value: "save", primary: true },
            { label: "Close without saving", value: "discard" },
            { label: "Cancel", value: "cancel" }
          ],
          onAction: value => {
            resolve(value);
            return true;
          },
          onCancel: () => resolve("cancel")
        });
      });
    }

    function showCustomDialog(config) {
      els.dialogOverlay.innerHTML = "";
      const dialog = document.createElement("section");
      dialog.className = "dialog";
      dialog.setAttribute("role", "dialog");
      dialog.setAttribute("aria-modal", "true");

      const head = document.createElement("div");
      head.className = "dialog-head";
      head.textContent = config.title || APP_NAME;
      dialog.appendChild(head);

      const body = document.createElement("div");
      body.className = "dialog-body";
      if (typeof config.body === "function") config.body(body);
      dialog.appendChild(body);

      const actions = document.createElement("div");
      actions.className = "dialog-actions";
      (config.actions || []).forEach(action => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "action-button" + (action.primary ? " primary" : "") + (action.danger ? " danger" : "");
        button.textContent = action.label;
        button.addEventListener("click", async () => {
          const shouldClose = config.onAction ? await config.onAction(action.value) : true;
          if (shouldClose !== false) hideDialog();
        });
        actions.appendChild(button);
      });
      dialog.appendChild(actions);

      els.dialogOverlay.appendChild(dialog);
      els.dialogOverlay.classList.add("show");

      const cancel = () => {
        hideDialog();
        if (config.onCancel) config.onCancel();
      };
      els.dialogOverlay.onclick = event => {
        if (event.target === els.dialogOverlay) cancel();
      };
      dialog.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          event.preventDefault();
          cancel();
        }
        if (event.key === "Enter" && event.target.tagName === "INPUT") {
          const primary = dialog.querySelector(".action-button.primary");
          if (primary) primary.click();
        }
      });
    }

    function hideDialog() {
      els.dialogOverlay.classList.remove("show");
      els.dialogOverlay.innerHTML = "";
      els.dialogOverlay.onclick = null;
      if (!isIOS()) els.editor.focus({ preventScroll: true });
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = window.setTimeout(() => {
        els.toast.classList.remove("show");
      }, 2400);
    }

    function handleShortcuts(event) {
      const mod = event.ctrlKey || event.metaKey;
      const key = event.key.toLowerCase();
      if (mod && key === "n") {
        event.preventDefault();
        addTab();
      } else if (mod && key === "o") {
        event.preventDefault();
        openWorkspace();
      } else if (mod && key === "s") {
        event.preventDefault();
        saveWorkspace();
      } else if (mod && key === "w") {
        event.preventDefault();
        closeTab(state.activeIndex);
      } else if (mod && key === "f") {
        event.preventDefault();
        openFindDialog();
      } else if (mod && (event.key === "+" || event.key === "=")) {
        event.preventDefault();
        adjustTextSize(1);
      } else if (mod && event.key === "-") {
        event.preventDefault();
        adjustTextSize(-1);
      } else if (mod && event.key === "0") {
        event.preventDefault();
        setTextSize(12);
      } else if (event.key === "F3") {
        event.preventDefault();
        findNext(event.shiftKey);
      }
    }

    document.querySelectorAll("[data-menu]").forEach(button => {
      button.addEventListener("click", () => showMenu(button.dataset.menu));
    });
    document.querySelectorAll("[data-action]").forEach(button => {
      button.addEventListener("click", async () => {
        if (button.dataset.action === "open") await openWorkspace();
        if (button.dataset.action === "save") await saveWorkspace();
        if (button.dataset.action === "search") openFindDialog();
        if (button.dataset.action === "undo") await runHistoryCommand("undo");
        if (button.dataset.action === "redo") await runHistoryCommand("redo");
      });
    });
    els.addTab.addEventListener("click", () => addTab());
    els.editor.addEventListener("input", handleEditorInput);
    els.editor.addEventListener("focus", () => {
      updateViewportMetrics();
      setTimeout(keepCaretVisible, 260);
    });
    els.editor.addEventListener("blur", () => setTimeout(updateViewportMetrics, 80));
    els.editor.addEventListener("select", () => {
      updateStatus();
      keepCaretVisible();
    });
    els.editor.addEventListener("keyup", () => {
      updateStatus();
      keepCaretVisible();
    });
    els.editor.addEventListener("click", () => {
      updateStatus();
      keepCaretVisible();
    });
    els.editor.addEventListener("scroll", () => {
      const tab = currentTab();
      if (tab) tab.scroll = els.editor.scrollTop || 0;
      if (state.lineNumbers) els.lineNumbers.scrollTop = els.editor.scrollTop;
    }, { passive: true });
    els.sheetClose.addEventListener("click", hideSheet);
    els.sheetOverlay.addEventListener("click", event => {
      if (event.target === els.sheetOverlay) hideSheet();
    });
    document.addEventListener("keydown", handleShortcuts);
    document.addEventListener("selectionchange", () => {
      if (document.activeElement === els.editor) {
        updateStatus();
        keepCaretVisible();
      }
    });
    window.addEventListener("beforeunload", event => {
      storeCurrentTab();
      if (!isDirty()) return;
      event.preventDefault();
      event.returnValue = "";
    });
    window.addEventListener("resize", () => {
      updateViewportMetrics();
      updateStatus();
    });
    window.addEventListener("orientationchange", () => {
      setTimeout(updateViewportMetrics, 160);
      setTimeout(updateViewportMetrics, 420);
    });
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateViewportMetrics);
      window.visualViewport.addEventListener("scroll", updateViewportMetrics);
    }

    installMobileViewportGuards();
    installSheetGestures();
    loadPreferences();
    updateViewportMetrics();
    loadTabIntoEditor(0);
    markClean(null);
  </script>
</body>
</html>
